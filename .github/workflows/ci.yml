name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      # Lint the harness source + docs (Biome + markdownlint). Does not need
      # the framework-under-test, so it runs without `mandrel sync`.
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      # Materialize the pinned framework-under-test so the scenario /
      # acceptance-eval pieces resolve `.agents/`. The pure-logic units run
      # regardless; the consumer-wired suites need this step.
      - run: npx mandrel sync
      - run: npm test
