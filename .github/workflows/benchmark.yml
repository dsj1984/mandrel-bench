name: Benchmark

# Run a full benchmark cohort from a single manual dispatch, spending only on
# the deficit and landing everything as a reviewable results PR (Epic #84,
# Story #90). Topology:
#
#   plan  → compute the per-cell deficit (bench/driver/topup-planner.js) and the
#           per-cell cost allocation; a complete cohort is a near-zero-cost no-op.
#           A non-blank `mandrel_version` input is installed (--no-save) BEFORE
#           the planner runs — the cohort stamp reads the INSTALLED
#           node_modules/mandrel/package.json (bench/driver/version-readers.js),
#           so the deficit, the aggregate derive pins, and every scorecard stamp
#           all resolve to the version under test, not the pinned lockfile dep.
#   canary→ run the cheapest rung (hello-world) FIRST as an end-to-end smoke; a
#           canary failure aborts the invocation before any expensive cell runs.
#   matrix→ one job per deficit cell (max-parallel 6); each job runs its single
#           cell, exports its BENCH_MAX_COST_USD share so the in-loop stop
#           enforces the per-cell ceiling, and uploads its scorecards + .raw
#           provenance as artifacts.
#   aggregate→ download every cell's artifacts, merge them into results/
#           (append-only NDJSON) and render the cohort report + results.html
#           (bench/report/aggregate-cli.js), then OPEN A PULL REQUEST. No job in
#           this workflow pushes to main directly — results-PR review replaces
#           the interactive STOP gates the local /benchmark flow uses.
#
# Required Action secrets:
#   ANTHROPIC_API_KEY  — the model credential the benchmarked sessions call with.
#   BENCH_GITHUB_TOKEN — token with repo create/delete + contents + issues +
#                        pull-requests scopes for the ephemeral per-cell sandbox
#                        (canary + cell jobs ONLY). The results PR is opened with
#                        the workflow's own GITHUB_TOKEN, not this PAT.

on:
  workflow_dispatch:
    inputs:
      mandrel_version:
        description: Framework (mandrel) version under test; blank uses the pinned dependency.
        type: string
        required: false
        default: ''
      model:
        description: Model id for the cohort stamp (e.g. claude-opus-4-8).
        type: string
        required: false
        default: ''
      scenarios:
        description: Comma-separated scenario ids to benchmark (blank = the 3-rung corpus).
        type: string
        required: false
        default: ''
      target_n:
        description: Uniform per-scenario run-count override; blank uses each scenario's targetN.
        type: string
        required: false
        default: ''
      max_cost_usd:
        description: USD ceiling allocated across the deficit cells for this invocation.
        type: string
        required: false
        default: '150'
      dry_run:
        description: Plan only — print the deficit plan and skip every paid cell.
        type: boolean
        required: false
        default: false

# One benchmark invocation at a time; never cancel an in-flight cohort mid-spend.
concurrency:
  group: benchmark
  cancel-in-progress: false

# Least privilege by default: the plan / canary / cell jobs only read the repo.
# Only the aggregate job (which opens the results PR) is granted write scopes,
# via its own job-level `permissions` block below.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # plan — compute the per-cell deficit and cost allocation (no run).
  # ---------------------------------------------------------------------------
  plan:
    name: Plan cohort top-up
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_deficit: ${{ steps.plan.outputs.has_deficit }}
      # The run-under-test cohort triple, resolved by the top-up planner and
      # surfaced here so the aggregate job's derive step can PIN the target
      # cohort (H1). Without these pins derive-cli auto-selects only when the
      # whole results tree holds exactly one cohort — which fails ambiguous
      # once main accumulates a second cohort (the benchmark's steady state).
      model: ${{ steps.plan.outputs.model }}
      framework_version: ${{ steps.plan.outputs.framework_version }}
      benchmark_version: ${{ steps.plan.outputs.benchmark_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts

      # Install the requested framework version under test (blank = keep the
      # pinned dependency). --no-save keeps package.json/package-lock.json
      # untouched; readFrameworkVersion (bench/driver/version-readers.js) reads
      # the INSTALLED node_modules/mandrel/package.json, so the planner's cohort
      # triple — and with it the top-up deficit and the aggregate job's derive
      # pins — resolves to THIS version. Runs before `npx mandrel sync` so the
      # materialized .agents/ bundle matches. The version reaches the run body
      # only as a quoted env var — never `${{ inputs.* }}` interpolation (H1).
      - name: Install mandrel version under test
        if: inputs.mandrel_version != ''
        env:
          MANDREL_VERSION: ${{ inputs.mandrel_version }}
        run: npm install "mandrel@$MANDREL_VERSION" --no-save --ignore-scripts

      - run: npx mandrel sync

      # Run the pure top-up planner and reduce its JSON plan to a matrix of
      # deficit cells via allocateMatrix(), which splits the BENCH_MAX_COST_USD
      # ceiling across the cells WEIGHTED by each cell's estimated cost (so an
      # expensive epic-scope cell gets a larger per-cell ceiling than a cheap
      # hello-world cell), not a flat per-cell share. Emits an empty matrix + a
      # has_deficit=false flag for a complete cohort so the paid jobs skip.
      - name: Plan deficit + allocate per-cell cost
        id: plan
        env:
          BENCH_MODEL: ${{ inputs.model }}
          BENCH_N: ${{ inputs.target_n }}
          BENCH_MAX_COST_USD: ${{ inputs.max_cost_usd }}
          BENCH_SCENARIOS: ${{ inputs.scenarios }}
        run: |
          set -euo pipefail
          # Build the planner argv from the (validated) BENCH_* env vars — never
          # interpolate `${{ inputs.* }}` into this run: body (shell injection).
          ARGS=(--dry-run --max-cost-usd "$BENCH_MAX_COST_USD")
          if [ -n "$BENCH_MODEL" ]; then ARGS+=(--model "$BENCH_MODEL"); fi
          if [ -n "$BENCH_N" ]; then ARGS+=(--n "$BENCH_N"); fi
          if [ -n "$BENCH_SCENARIOS" ]; then ARGS+=(--scenarios "$BENCH_SCENARIOS"); fi
          node bench/driver/topup-planner.js "${ARGS[@]}" > plan.json
          cat plan.json
          # Thin caller: the weighted allocation lives in allocateMatrix() so it
          # is unit-tested; this step only reads plan.json and writes outputs.
          node --input-type=module -e '
            import { appendFileSync, readFileSync } from "node:fs";
            import { allocateMatrix } from "./bench/driver/topup-planner.js";
            const plan = JSON.parse(readFileSync("plan.json", "utf8"));
            const matrix = allocateMatrix(plan);
            const out = process.env.GITHUB_OUTPUT;
            appendFileSync(out, `matrix=${JSON.stringify(matrix)}\n`);
            appendFileSync(out, `has_deficit=${matrix.include.length > 0}\n`);
            // Surface the resolved run-under-test cohort triple so the aggregate
            // derive step can pin it (H1). planTopup returns the resolved
            // { model, frameworkVersion, benchmarkVersion } on plan.cohort.
            const cohort = plan.cohort ?? {};
            appendFileSync(out, `model=${cohort.model ?? ""}\n`);
            appendFileSync(out, `framework_version=${cohort.frameworkVersion ?? ""}\n`);
            appendFileSync(out, `benchmark_version=${cohort.benchmarkVersion ?? ""}\n`);
          '

  # ---------------------------------------------------------------------------
  # canary — cheapest rung FIRST; a failure aborts the invocation.
  # ---------------------------------------------------------------------------
  canary:
    name: Canary (hello-world smoke)
    needs: plan
    if: needs.plan.outputs.has_deficit == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts

      # Same framework-version override as the plan job: the canary must smoke
      # the version actually under test, with a matching .agents/ bundle.
      - name: Install mandrel version under test
        if: inputs.mandrel_version != ''
        env:
          MANDREL_VERSION: ${{ inputs.mandrel_version }}
        run: npm install "mandrel@$MANDREL_VERSION" --no-save --ignore-scripts

      - run: npx mandrel sync

      # Run the hello-world rung end to end BEFORE the paid matrix fans out. If
      # this fails the whole invocation aborts (the matrix `needs` this job), so
      # a broken harness never burns the full cohort budget.
      - name: Run hello-world canary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BENCH_GITHUB_TOKEN: ${{ secrets.BENCH_GITHUB_TOKEN }}
          BENCH_SANDBOX_OWNER: ${{ github.repository_owner }}
          BENCH_MODEL: ${{ inputs.model }}
          BENCH_SCENARIOS: hello-world
          BENCH_MAX_COST_USD: '5'
        run: node bench/run.js

  # ---------------------------------------------------------------------------
  # matrix — one job per deficit cell (max-parallel 6). Only runs after the
  # canary passes, so a canary failure aborts the whole invocation.
  # ---------------------------------------------------------------------------
  cell:
    name: Cell ${{ matrix.scenario }} / ${{ matrix.arm }}
    needs: [plan, canary]
    if: needs.plan.outputs.has_deficit == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts

      # Same framework-version override as the plan job: the cell benchmarks
      # the version under test and stamps its scorecards with it (the stamp
      # reads the INSTALLED node_modules/mandrel/package.json), keeping the
      # cell's records inside the cohort triple the plan job resolved.
      - name: Install mandrel version under test
        if: inputs.mandrel_version != ''
        env:
          MANDREL_VERSION: ${{ inputs.mandrel_version }}
        run: npm install "mandrel@$MANDREL_VERSION" --no-save --ignore-scripts

      - run: npx mandrel sync

      # Run this single deficit cell. BENCH_MAX_COST_USD carries THIS cell's
      # allocated share of the invocation ceiling, so the in-loop stop enforces
      # the per-cell ceiling and no single cell can overspend the cohort budget.
      - name: Run cell
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BENCH_GITHUB_TOKEN: ${{ secrets.BENCH_GITHUB_TOKEN }}
          BENCH_SANDBOX_OWNER: ${{ github.repository_owner }}
          BENCH_MODEL: ${{ inputs.model }}
          BENCH_SCENARIOS: ${{ matrix.scenario }}
          BENCH_ARMS: ${{ matrix.arm }}
          BENCH_N: ${{ inputs.target_n }}
          BENCH_MAX_COST_USD: ${{ matrix.allocatedCostUsd }}
          # Per-invocation run-count ceiling: a cell is one scenario × arm, so
          # cap new runs at its deficit — never re-run the full targetN (H2).
          BENCH_MAX_RUNS: ${{ matrix.deficit }}
        run: node bench/run.js

      # Upload this cell's scorecards AND its .raw provenance tree as artifacts
      # so the aggregate job can merge them without re-running anything.
      - name: Upload cell scorecards + provenance
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecards-${{ matrix.scenario }}-${{ matrix.arm }}
          path: |
            results/**/scorecards.ndjson
            results/**/.raw/**
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # aggregate — merge every cell's artifacts, render, and OPEN A PR (never push
  # to main). Results-PR review replaces the interactive STOP gates.
  # ---------------------------------------------------------------------------
  aggregate:
    name: Aggregate + open results PR
    needs: [plan, cell]
    # always() so a single failed cell doesn't strand the paid work of the rest
    # with no results PR — aggregate-cli tolerates partial artifacts (H3).
    if: always() && needs.plan.outputs.has_deficit == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    # Only this job needs write scopes — it commits the results branch and opens
    # the PR. The plan / canary / cell jobs stay read-only (M3).
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts

      # Pull down every cell's scorecards + provenance into a single tree.
      - name: Download all cell artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Merge the downloaded scorecards into results/ (append-only NDJSON) and
      # render the cohort report + results.html from the resulting tree WITHOUT
      # invoking any run.
      - name: Merge + render results tree
        run: node bench/report/aggregate-cli.js --artifacts-dir artifacts --results-dir results

      # Derive the Phase-4 feedback findings for the merged cohort (Epic #85).
      # This COMMITS the finding-envelope JSON into the results tree (picked up
      # by the add-paths below) and captures the Markdown findings section, which
      # we embed in the PR body — so the findings are always reviewed with the
      # cohort and the loop degrades to D-009 behaviour if cross-repo filing is
      # unavailable. Merging this PR lands the envelope on main and fires the
      # merge-gated filer (.github/workflows/feedback-file.yml); filing NEVER
      # happens here (no unreviewed write). Tolerant: an empty / ambiguous tree
      # yields an empty findings section rather than failing the aggregate job.
      - name: Derive feedback findings
        id: findings
        env:
          BENCH_RUN_ID: ${{ github.run_id }}
          # PIN the target cohort to the run-under-test triple (H1). Passed
          # through env (never interpolated into the run: body) to keep the
          # shell-injection surface closed. An empty pin means "don't filter on
          # this field" in derive-cli (a null pin) — harmless, but in a normal
          # run the planner resolves all three, so the derive step selects the
          # exact cohort even when main holds several.
          BENCH_COHORT_MODEL: ${{ needs.plan.outputs.model }}
          BENCH_COHORT_FRAMEWORK_VERSION: ${{ needs.plan.outputs.framework_version }}
          BENCH_COHORT_BENCHMARK_VERSION: ${{ needs.plan.outputs.benchmark_version }}
        run: |
          set -euo pipefail
          # Build the derive argv from the (validated) BENCH_* env vars, adding a
          # cohort pin only when the planner resolved a non-empty value.
          DERIVE_ARGS=(--results-dir results --stamp "$BENCH_RUN_ID" --pr-body-out findings-pr-body.md)
          if [ -n "$BENCH_COHORT_MODEL" ]; then DERIVE_ARGS+=(--model "$BENCH_COHORT_MODEL"); fi
          if [ -n "$BENCH_COHORT_FRAMEWORK_VERSION" ]; then DERIVE_ARGS+=(--framework-version "$BENCH_COHORT_FRAMEWORK_VERSION"); fi
          if [ -n "$BENCH_COHORT_BENCHMARK_VERSION" ]; then DERIVE_ARGS+=(--benchmark-version "$BENCH_COHORT_BENCHMARK_VERSION"); fi
          if node bench/feedback/derive-cli.js "${DERIVE_ARGS[@]}"; then
            :
          else
            echo "## Benchmark findings" > findings-pr-body.md
            echo "" >> findings-pr-body.md
            echo "No findings section derived (empty or ambiguous results tree)." >> findings-pr-body.md
          fi
          # Randomize the heredoc delimiter so a findings body can never inject
          # a premature terminator into GITHUB_OUTPUT (Actions output-injection
          # hardening, M6). The body is enumerated tokens today, but a random
          # delimiter closes the class regardless of what the derive step emits.
          DELIM="FINDINGS_EOF_$(openssl rand -hex 8)"
          {
            echo "markdown<<$DELIM"
            cat findings-pr-body.md
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      # Open a pull request with the merged results. This job NEVER pushes to
      # main — the PR is the review gate. create-pull-request pushes to a
      # dedicated results branch and opens the PR against the default branch.
      - name: Open results PR
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.x
        with:
          # The workflow's own GITHUB_TOKEN (scoped by the job-level write
          # permissions above) suffices to open the PR — the destructive-scope
          # BENCH_GITHUB_TOKEN PAT stays confined to the canary/cell jobs (M2).
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: benchmark/results-${{ github.run_id }}
          base: main
          commit-message: "chore(bench): cohort results from run ${{ github.run_id }}"
          title: "chore(bench): benchmark cohort results (run ${{ github.run_id }})"
          body: |
            Automated benchmark cohort results from workflow run ${{ github.run_id }}.

            Review this PR in place of the interactive STOP gate: inspect the
            rendered scorecard + delta-vs-noise-band, then merge to publish.
            Merging lands the finding envelope on main and fires the merge-gated
            feedback filer (.github/workflows/feedback-file.yml); nothing is
            filed on the mandrel repo until you merge.

            ${{ steps.findings.outputs.markdown }}
          add-paths: |
            results/**
